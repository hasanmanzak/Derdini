name: meAndAI AI capabilities lifecycle
run-name: meAndAI AI capabilities lifecycle [${{ inputs.correlation_id || github.event_name }}]

env:
  PROTOCOL_REPOSITORY: hasanmanzak/meAndAI
  BOOTSTRAP_PROTOCOL_TAG: v0.9.2

on:
  schedule:
    - cron: "17 5 * * *"
  workflow_dispatch:
    inputs:
      correlation_id:
        description: Launcher correlation identity
        required: false
        type: string

permissions:
  contents: read

concurrency:
  group: meandai-protocol-update-${{ github.repository }}
  cancel-in-progress: false

jobs:
  propose-update:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate consumer updater credential
        shell: pwsh
        env:
          UPDATER_TOKEN: ${{ secrets.MEANDAI_UPDATER_TOKEN }}
        run: |
          if (-not $env:UPDATER_TOKEN) {
            throw 'MEANDAI_UPDATER_TOKEN is required with consumer-scoped Contents, Pull requests, and Workflows write access.'
          }

      - name: Verify immutable protocol release
        shell: pwsh
        env:
          PROTOCOL_TOKEN: ${{ secrets.MEANDAI_PROTOCOL_TOKEN || github.token }}
        run: |
          if (-not $env:PROTOCOL_TOKEN) {
            throw 'A protocol read token is required to verify the bootstrap release.'
          }
          $headers = @{
            Accept = 'application/vnd.github+json'
            Authorization = "Bearer $env:PROTOCOL_TOKEN"
            'X-GitHub-Api-Version' = '2026-03-10'
            'User-Agent' = 'meAndAI-consumer-lifecycle'
          }
          $tag = [Uri]::EscapeDataString($env:BOOTSTRAP_PROTOCOL_TAG)
          $uri = "https://api.github.com/repos/$env:PROTOCOL_REPOSITORY/releases/tags/$tag"
          $release = Invoke-RestMethod -Method Get -Uri $uri -Headers $headers
          $publishedAt = [DateTimeOffset]::MinValue
          if ([string]$release.tag_name -cne $env:BOOTSTRAP_PROTOCOL_TAG -or
              $release.draft -isnot [bool] -or $release.draft -or
              $release.prerelease -isnot [bool] -or $release.prerelease -or
              $release.immutable -isnot [bool] -or -not $release.immutable -or
              -not [DateTimeOffset]::TryParse([string]$release.published_at, [ref]$publishedAt)) {
            throw "Bootstrap source '$env:BOOTSTRAP_PROTOCOL_TAG' is not an exact published immutable GitHub Release."
          }

      - name: Check out consumer default branch
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 0
          submodules: false
          token: ${{ secrets.MEANDAI_UPDATER_TOKEN }}
          persist-credentials: true

      - name: Check out protocol release inventory
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: hasanmanzak/meAndAI
          token: ${{ secrets.MEANDAI_PROTOCOL_TOKEN || github.token }}
          ref: ${{ env.BOOTSTRAP_PROTOCOL_TAG }}
          path: .meandai-update-source
          fetch-depth: 0
          persist-credentials: false

      - name: Resolve and propose AI capabilities lifecycle
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.MEANDAI_UPDATER_TOKEN }}
          PROTOCOL_TOKEN: ${{ secrets.MEANDAI_PROTOCOL_TOKEN || github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          $modulePath = '.github/scripts/MeAndAI.ProtocolUpdate.psm1'
          $adapterPath = '.github/scripts/Invoke-MeAndAIProtocolUpdate.ps1'
          $moduleExists = Test-Path -LiteralPath $modulePath -PathType Leaf
          $adapterExists = Test-Path -LiteralPath $adapterPath -PathType Leaf
          if ($moduleExists -xor $adapterExists) {
            Write-Host 'Local updater installation is partial; routing to adoption review.'
          }

          $protocolEntry = (& git ls-tree HEAD -- .ai/protocol) -join ''
          $manifestExists = Test-Path -LiteralPath '.ai/adoption/meandai-capabilities.json'
          $completeLocalUpdater = $moduleExists -and $adapterExists -and
            $protocolEntry -match '^160000\s+commit\s+[0-9a-f]{40}\s+' -and
            -not $manifestExists

          $bootstrap = '.meandai-update-source/templates/project/.github/scripts/Invoke-MeAndAICapabilitiesBootstrap.ps1'
          if ($completeLocalUpdater) {
            & "./$bootstrap" -TargetTag $env:BOOTSTRAP_PROTOCOL_TAG `
              -ValidateLocalUpdaterOnly
            & "./$adapterPath"
          }
          else {
            & "./$bootstrap" -TargetTag $env:BOOTSTRAP_PROTOCOL_TAG
          }
