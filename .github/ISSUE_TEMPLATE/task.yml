name: Task
description: Track bounded implementation or maintenance work.
title: "[TASK-NNNN] "
labels: ["type:task", "priority:p2"]
body:
  - type: input
    id: work_id
    attributes:
      label: Work ID
      placeholder: TASK-0001
    validations:
      required: true
  - type: input
    id: parent
    attributes:
      label: Parent work
      description: Link the owning feature, subfeature, bug, or finding.
    validations:
      required: true
  - type: textarea
    id: outcome
    attributes:
      label: Outcome and scope
      description: State the bounded result and non-goals.
    validations:
      required: true
  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance and test impact
      description: State measurable completion and required test changes or evidence.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Related records
      description: Link related issues, pull requests, decisions, wiki pages, or docs.
    validations:
      required: true
