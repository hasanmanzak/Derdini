name: Review finding
description: Record an evidence-backed audit or self-review observation.
title: "[FIND-NNNN] "
labels: ["type:finding"]
body:
  - type: input
    id: work_id
    attributes:
      label: Finding ID
      placeholder: FIND-0001
    validations:
      required: true
  - type: dropdown
    id: disposition
    attributes:
      label: Disposition
      options:
        - Blocking
        - AcceptedResidual
        - ExternalOrLegacyFollowUp
        - OptionalImprovement
    validations:
      required: true
  - type: dropdown
    id: classification
    attributes:
      label: Finding classification
      options:
        - Confirmed defect
        - Risk
        - Optional improvement
    validations:
      required: true
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - Correctness
        - Architecture
        - Refactor
        - Duplication
        - Test gap
        - Documentation drift
        - Security or privacy
        - Performance or operations
    validations:
      required: true
  - type: dropdown
    id: severity
    attributes:
      label: Severity
      options:
        - critical
        - high
        - medium
        - low
        - info
    validations:
      required: true
  - type: dropdown
    id: priority
    attributes:
      label: Queue priority
      description: Select the queue priority; p0 is highest. Apply the matching repository label after triage.
      options:
        - p0
        - p1
        - p2
        - p3
    validations:
      required: true
  - type: dropdown
    id: impact_rank
    attributes:
      label: Impact rank
      options:
        - critical
        - high
        - medium
        - low
        - info
    validations:
      required: true
  - type: dropdown
    id: confidence
    attributes:
      label: Confidence
      options:
        - high
        - medium
        - low
    validations:
      required: true
  - type: textarea
    id: dependencies
    attributes:
      label: Finding dependencies
      description: List prerequisite FIND-NNNN identifiers, or write None.
      placeholder: None
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Evidence and affected scope
      description: Cite files, lines, behavior, and commands; redact secrets and unnecessary personal data.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Impact rationale and recommended action
      description: Explain the impact rank, why it matters, and the smallest safe remediation.
    validations:
      required: true
  - type: textarea
    id: references
    attributes:
      label: Related records
      description: Link related issues, pull requests, features, decisions, tests, wiki pages, or docs.
    validations:
      required: true
